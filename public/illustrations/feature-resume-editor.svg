  <rect x="72" y="174" width="136" height="5" rx="2.5" fill="#90CAF9"/>
  <rect x="72" y="186" width="104" height="5" rx="2.5" fill="#BBDEFB"/>
  <rect x="64" y="208" width="168" height="40" rx="8" fill="#F5F9FF" stroke="#E3F2FD" stroke-width="1.5"/>
  <rect x="72" y="220" width="40" height="5" rx="2.5" fill="#90CAF9"/>
  <rect x="72" y="232" width="80" height="5" rx="2.5" fill="#BBDEFB"/>
