  <rect x="228" y="68" width="136" height="176" rx="12" fill="none" stroke="#1976D2" stroke-width="2.5" stroke-dasharray="6 4" opacity="0.6"/>
  <circle cx="360" cy="88" r="22" fill="#1976D2"/>
  <path d="M354 88l4 4 8-10" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="48" y="372" font-family="system-ui,sans-serif" font-size="12" font-weight="600" fill="#1976D2" opacity="0.7">Swap templates  content stays intact</text>
