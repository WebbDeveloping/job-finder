  <path d="M252 168h16" stroke="#1976D2" stroke-width="2" stroke-linecap="round"/>
  <path d="M260 160l8 8-8 8" stroke="#1976D2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <circle cx="260" cy="168" r="20" fill="#1976D2" opacity="0.1"/>
