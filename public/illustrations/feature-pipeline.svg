<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 400" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="pipe-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#E3F2FD"/>
    </linearGradient>
    <filter id="pipe-shadow" x="-8%" y="-8%" width="116%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1976D2" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="520" height="400" rx="20" fill="url(#pipe-bg)"/>
  <rect x="40" y="328" width="440" height="48" rx="10" fill="#BBDEFB" opacity="0.55"/>
  <g filter="url(#pipe-shadow)">
    <rect x="48" y="56" width="424" height="256" rx="14" fill="#fff" stroke="#1976D2" stroke-width="2"/>
  </g>
  <rect x="64" y="72" width="88" height="24" rx="6" fill="#1976D2" opacity="0.08"/>
  <rect x="64" y="76" width="48" height="8" rx="4" fill="#1976D2" opacity="0.35"/>
  <rect x="120" y="76" width="24" height="8" rx="4" fill="#90CAF9"/>
  <!-- column headers -->
  <text x="76" y="118" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#1976D2" opacity="0.85">Wishlist</text>
  <text x="176" y="118" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#1976D2" opacity="0.85">Applied</text>
  <text x="276" y="118" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#1976D2" opacity="0.85">Interview</text>
  <text x="376" y="118" font-family="system-ui,sans-serif" font-size="11" font-weight="600" fill="#1976D2" opacity="0.85">Offer</text>
  <!-- dividers -->
  <line x1="160" y1="104" x2="160" y2="296" stroke="#E3F2FD" stroke-width="2"/>
  <line x1="260" y1="104" x2="260" y2="296" stroke="#E3F2FD" stroke-width="2"/>
  <line x1="360" y1="104" x2="360" y2="296" stroke="#E3F2FD" stroke-width="2"/>
  <!-- wishlist card -->
  <rect x="72" y="132" width="72" height="56" rx="8" fill="#F5F9FF" stroke="#90CAF9" stroke-width="1.5"/>
  <rect x="80" y="144" width="40" height="6" rx="3" fill="#1976D2" opacity="0.25"/>
  <rect x="80" y="158" width="52" height="5" rx="2.5" fill="#BBDEFB"/>
  <rect x="80" y="170" width="36" height="5" rx="2.5" fill="#BBDEFB"/>
  <!-- applied cards -->
  <rect x="172" y="128" width="72" height="52" rx="8" fill="#fff" stroke="#1976D2" stroke-width="1.5"/>
  <rect x="180" y="140" width="44" height="6" rx="3" fill="#1976D2" opacity="0.3"/>
  <rect x="180" y="154" width="48" height="5" rx="2.5" fill="#E3F2FD"/>
  <rect x="172" y="192" width="72" height="48" rx="8" fill="#F5F9FF" stroke="#90CAF9" stroke-width="1.5"/>
  <rect x="180" y="204" width="36" height="5" rx="2.5" fill="#BBDEFB"/>
  <rect x="180" y="216" width="52" height="5" rx="2.5" fill="#BBDEFB"/>
  <!-- interview card -->
  <rect x="272" y="136" width="72" height="64" rx="8" fill="#fff" stroke="#1976D2" stroke-width="2"/>
  <circle cx="308" cy="156" r="10" fill="#1976D2" opacity="0.15"/>
  <path d="M304 156h8M308 152v8" stroke="#1976D2" stroke-width="1.5" stroke-linecap="round"/>
  <rect x="280" y="172" width="48" height="5" rx="2.5" fill="#90CAF9"/>
  <rect x="280" y="184" width="40" height="5" rx="2.5" fill="#BBDEFB"/>
  <rect x="288" y="128" width="40" height="14" rx="7" fill="#FFC107"/>
  <text x="296" y="138" font-family="system-ui,sans-serif" font-size="8" font-weight="700" fill="#fff">Tue</text>
  <!-- offer card -->
  <rect x="372" y="148" width="72" height="72" rx="8" fill="#E8F5E9" stroke="#66BB6A" stroke-width="2"/>
  <circle cx="408" cy="172" r="14" fill="#66BB6A" opacity="0.2"/>
  <path d="M402 172l4 4 10-10" stroke="#2E7D32" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="380" y="192" width="48" height="5" rx="2.5" fill="#A5D6A7"/>
  <rect x="380" y="204" width="40" height="5" rx="2.5" fill="#C8E6C9"/>
  <!-- drag hint -->
  <circle cx="448" cy="88" r="18" fill="#1976D2" opacity="0.12"/>
  <path d="M442 88h12M448 82v12" stroke="#1976D2" stroke-width="2" stroke-linecap="round"/>
</svg>
