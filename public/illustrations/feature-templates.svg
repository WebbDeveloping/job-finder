  </defs>
  <rect width="520" height="400" rx="20" fill="url(#tpl-bg)"/>
  <rect x="48" y="48" width="200" height="12" rx="6" fill="#1976D2" opacity="0.1"/>
  <rect x="48" y="68" width="120" height="8" rx="4" fill="#1976D2" opacity="0.25"/>
