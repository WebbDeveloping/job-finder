<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 400" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="editor-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#E3F2FD"/>
    </linearGradient>
    <filter id="editor-shadow" x="-6%" y="-6%" width="112%" height="114%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#1976D2" flood-opacity="0.14"/>
    </filter>
    <linearGradient id="preview-shine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#fff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#fff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="520" height="400" rx="20" fill="url(#editor-bg)"/>
  <rect x="40" y="328" width="200" height="48" rx="10" fill="#BBDEFB" opacity="0.5"/>
  <rect x="280" y="328" width="200" height="48" rx="10" fill="#1976D2" opacity="0.08"/>
  <!-- editor panel -->
  <g filter="url(#editor-shadow)">
    <rect x="48" y="48" width="200" height="264" rx="14" fill="#fff" stroke="#1976D2" stroke-width="2"/>
  </g>
  <rect x="64" y="64" width="80" height="10" rx="5" fill="#1976D2" opacity="0.2"/>
  <rect x="64" y="88" width="168" height="48" rx="8" fill="#F5F9FF" stroke="#90CAF9" stroke-width="1.5"/>
