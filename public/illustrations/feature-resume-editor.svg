  <rect x="64" y="260" width="168" height="36" rx="8" fill="#E3F2FD" stroke="#1976D2" stroke-width="2"/>
  <rect x="72" y="272" width="100" height="6" rx="3" fill="#1976D2" opacity="0.45"/>
  <rect x="72" y="284" width="72" height="5" rx="2.5" fill="#90CAF9"/>
  <!-- live preview chip -->
  <rect x="72" y="312" width="88" height="22" rx="11" fill="#1976D2"/>
  <circle cx="86" cy="323" r="4" fill="#66BB6A"/>
  <text x="96" y="327" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#fff">Live preview</text>
  <!-- preview panel -->
  <g filter="url(#editor-shadow)">
    <rect x="272" y="40" width="200" height="280" rx="14" fill="#fff" stroke="#1976D2" stroke-width="2"/>
  </g>
  <rect x="288" y="56" width="168" height="12" rx="4" fill="#1976D2" opacity="0.12"/>
