      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#E3F2FD"/>
    </linearGradient>
    <filter id="tpl-shadow" x="-10%" y="-10%" width="120%" height="125%">
      <feDropShadow dx="0" dy="5" stdDeviation="9" flood-color="#1976D2" flood-opacity="0.13"/>
