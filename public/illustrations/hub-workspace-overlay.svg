<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 400" fill="none" aria-hidden="true">
  <defs>
    <filter id="hub-ov-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#90CAF9" flood-opacity="0.35"/>
    </filter>
  </defs>
  <!-- connector lines -->
  <path d="M140 120 Q200 140 260 160" stroke="#90CAF9" stroke-width="1.5" stroke-dasharray="5 5" opacity="0.55"/>
  <path d="M380 100 Q320 130 280 155" stroke="#90CAF9" stroke-width="1.5" stroke-dasharray="5 5" opacity="0.55"/>
  <path d="M400 300 Q340 260 300 230" stroke="#90CAF9" stroke-width="1.5" stroke-dasharray="5 5" opacity="0.55"/>
  <!-- hub center ring -->
  <circle cx="260" cy="200" r="118" stroke="#1976D2" stroke-width="1.5" opacity="0.35" stroke-dasharray="4 6"/>
  <!-- all-in-one badge -->
  <g filter="url(#hub-ov-glow)">
    <rect x="168" y="24" width="184" height="36" rx="18" fill="#1976D2"/>
  </g>
  <text x="188" y="47" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#fff">All-in-one workspace</text>
  <!-- tool labels -->
  <g filter="url(#hub-ov-glow)">
    <rect x="24" y="88" width="96" height="28" rx="14" fill="#fff" fill-opacity="0.95"/>
  </g>
  <text x="38" y="107" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#1976D2">Pipeline</text>
  <g filter="url(#hub-ov-glow)">
    <rect x="388" y="72" width="108" height="28" rx="14" fill="#fff" fill-opacity="0.95"/>
  </g>
  <text x="402" y="91" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#1976D2">Dashboard</text>
  <g filter="url(#hub-ov-glow)">
    <rect x="368" y="312" width="108" height="28" rx="14" fill="#fff" fill-opacity="0.95"/>
  </g>
  <text x="382" y="331" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#1565C0">Analytics</text>
  <g filter="url(#hub-ov-glow)">
    <rect x="32" y="312" width="104" height="28" rx="14" fill="#E8F5E9" stroke="#66BB6A" stroke-width="1.5"/>
